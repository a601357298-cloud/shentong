<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图数据库选择题练习</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --ok: #15803d;
      --ok-soft: #dcfce7;
      --bad: #b91c1c;
      --bad-soft: #fee2e2;
      --border: #e5e7eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 240px);
      color: var(--text);
      line-height: 1.65;
    }

    .container {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 18px 0 8px;
    }

    .meta-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .meta-card strong {
      display: block;
      font-size: 22px;
      margin-bottom: 2px;
    }

    .quiz-list {
      display: grid;
      gap: 18px;
      margin-top: 20px;
    }

    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .question-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .q-index {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #111827;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    .tag {
      padding: 4px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
    }

    .question-title {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      transition: .18s ease;
      font-size: 15px;
      color: var(--text);
    }

    .option-btn:hover {
      transform: translateY(-1px);
      border-color: #bfdbfe;
      background: #f8fbff;
    }

    .option-btn.correct {
      border-color: #86efac;
      background: var(--ok-soft);
      color: #14532d;
      font-weight: 700;
    }

    .option-btn.wrong {
      border-color: #fca5a5;
      background: var(--bad-soft);
      color: #7f1d1d;
      font-weight: 700;
    }

    .option-btn.dimmed {
      opacity: .72;
    }

    .explanation {
      display: none;
      margin-top: 14px;
      border-radius: 16px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      background: #f9fafb;
    }

    .explanation.show { display: block; }
    .explanation.correct-mode {
      border-color: #86efac;
      background: #f0fdf4;
    }
    .explanation.wrong-mode {
      border-color: #fecaca;
      background: #fef2f2;
    }

    .result-line {
      font-weight: 800;
      margin-bottom: 6px;
    }

    .summary-panel {
      margin-top: 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .summary-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
    }

    .action-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: .18s ease;
    }

    .action-btn.primary {
      background: var(--primary);
      color: #fff;
    }

    .action-btn.primary:hover {
      opacity: .92;
      transform: translateY(-1px);
    }

    .action-btn.secondary {
      background: #eef2ff;
      color: #1e3a8a;
      border: 1px solid #c7d2fe;
    }

    .action-btn.secondary:hover {
      background: #e0e7ff;
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .container { width: min(100% - 20px, 960px); padding-top: 18px; }
      .hero, .question-card, .summary-panel { padding: 18px; border-radius: 18px; }
      .question-title { font-size: 18px; }
      .summary-actions { flex-direction: column; }
      .action-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="badge">静态网站 · index.html</div>
      <h1>图数据库选择题练习站</h1>
      <p class="lead">题目整理自飞书里的《图数据库学习笔记-2026-03-26》。点击任意选项后，会直接在题目下方显示对错和解析，顺手还能把错题一键导出成 Markdown。</p>
      <div class="meta">
        <div class="meta-card">
          <strong>12</strong>
          <span>道单选题</span>
        </div>
        <div class="meta-card">
          <strong>6</strong>
          <span>核心主题：更新 / 路径 / 建模 / 导入 / 转型 / 易错点</span>
        </div>
        <div class="meta-card">
          <strong>一键导出</strong>
          <span>做完题可导出错题 Markdown</span>
        </div>
      </div>
    </section>

    <main id="quiz" class="quiz-list"></main>

    <section class="summary-panel">
      <h2 style="margin:0 0 8px;">做完别急着跑</h2>
      <p id="summaryText" style="margin:0;color:var(--muted);">先把题点完。页面底部这个按钮，专门负责把你这次翻车的题打包带走。</p>
      <div class="summary-actions">
        <button id="exportWrongBtn" class="action-btn primary">导出错题 Markdown</button>
        <button id="resetBtn" class="action-btn secondary">重做一遍</button>
      </div>
    </section>

    <p class="footer">复习建议：先自己选，再看解析。别让 shortestPath 和 MERGE 联手把你送进沟里。</p>
  </div>

  <script>
    const questions = [
      {
        id: 1,
        tag: '更新数据',
        question: '在图数据库笔记中，更新属性时 `WHERE` 和 `SET` 的正确顺序是？',
        options: [
          'MATCH ... SET ... WHERE ...',
          'MATCH ... WHERE ... SET ...',
          'WHERE ... MATCH ... SET ...',
          'SET ... MATCH ... WHERE ...'
        ],
        answer: 1,
        explanation: '笔记里明确强调：常见写法是 `MATCH ... WHERE ... SET ...`，`WHERE` 要写在 `SET` 前面。把顺序写反，语法和逻辑都容易翻车。'
      },
      {
        id: 2,
        tag: 'EXISTS',
        question: '下面哪种写法最符合笔记中对 `EXISTS()` 的说明？',
        options: [
          'WHERE EXISTS(MATCH (n) RETURN n)',
          'WHERE EXISTS(n.name)',
          'WHERE EXISTS = n.name',
          'WHERE MATCH EXISTS(n.name)'
        ],
        answer: 1,
        explanation: '笔记强调：`EXISTS()` 的小括号里通常直接写属性或条件，不需要再套一层 `MATCH`。因此 `WHERE EXISTS(n.name)` 才是这里的正确思路。'
      },
      {
        id: 3,
        tag: '路径节点处理',
        question: '如果想对路径中的节点做条件筛选并返回属性，笔记推荐的思路是？',
        options: [
          '先用 `nodes(p)` 取出路径节点，再结合条件处理',
          '只能直接对路径 `p` 使用 `SUM`',
          '必须先把路径转成 CSV 再判断',
          '路径中的节点无法做条件判断'
        ],
        answer: 0,
        explanation: '笔记给出的典型思路是先 `nodes(p)` 取出路径节点，再用 `n IN nodes(p) WHERE 条件 | 返回内容` 这种类似列表推导式的形式做筛选和返回。'
      },
      {
        id: 4,
        tag: '标签判断',
        question: '判断节点 `n` 是否属于“人员”这一类，正确写法是？',
        options: [
          'n = 人员',
          'n == 人员',
          'n:人员',
          'type(n) = 人员标签'
        ],
        answer: 2,
        explanation: '笔记反复提醒：判断节点类型不是用等于号，而是用冒号表示标签，所以写法应是 `n:人员`。'
      },
      {
        id: 5,
        tag: '最短路径',
        question: '关于 `shortestPath()` 和 `allShortestPaths()`，下列说法哪项正确？',
        options: [
          '`shortestPath()` 返回所有最短路径，`allShortestPaths()` 只返回一条',
          '`shortestPath()` 返回一条最短路径，`allShortestPaths()` 返回所有同长最短路径',
          '两者作用完全一样，只是名字不同',
          '`allShortestPaths()` 只能用于一跳路径'
        ],
        answer: 1,
        explanation: '这个是笔记里的高频考点：`shortestPath()` 找一条最短路径；`allShortestPaths()` 找所有长度同样最短的路径。'
      },
      {
        id: 6,
        tag: '路径跳数',
        question: '在路径模式中，哪一个表示“多跳”？',
        options: [
          '[]',
          '[?]',
          '[*]',
          '[=]'
        ],
        answer: 2,
        explanation: '笔记特别提醒：`[]` 是一跳，`[*]` 才表示多跳。这个地方很容易凭感觉写错。'
      },
      {
        id: 7,
        tag: '字符串处理',
        question: '关于 `substring()` 的说法，哪项符合笔记内容？',
        options: [
          '下标从 1 开始',
          '只能用于数字字段',
          '下标从 0 开始，可做固定位置判断',
          '只能截取到字符串末尾，不能指定长度'
        ],
        answer: 2,
        explanation: '笔记明确写了：`substring()` 常用于提取字符串某一段，下标从 `0` 开始，做固定位置判断也很常见。'
      },
      {
        id: 8,
        tag: '字段建模',
        question: '身份证号、公司编号、项目编号这类字段，笔记建议优先存成什么类型？',
        options: [
          '整数',
          '浮点数',
          '字符串',
          '布尔值'
        ],
        answer: 2,
        explanation: '这类编号字段可能很长、可能有前导零，用数字类型容易精度失真或把前导零吃掉，所以笔记建议优先存字符串。'
      },
      {
        id: 9,
        tag: '建模原则',
        question: '图数据库建模的核心三分法是什么？',
        options: [
          '实体做关系，联系做节点，描述做表',
          '实体做节点，联系做关系，描述做属性',
          '实体做属性，联系做节点，描述做关系',
          '实体做表，联系做字段，描述做索引'
        ],
        answer: 1,
        explanation: '这是笔记里的建模主线：实体做节点，联系做关系，描述做属性。后面审批场景那个例子，就是拿这个原则做延展。'
      },
      {
        id: 10,
        tag: 'CSV 导入',
        question: '关于 `MERGE` 和 `SET` 的分工，哪项是笔记推荐的稳妥写法？',
        options: [
          '`MERGE` 放所有属性，`SET` 尽量不用',
          '`MERGE` 只放唯一标识字段，其他描述字段交给 `SET`',
          '`SET` 只负责唯一标识，其他都放 `MERGE`',
          '`CREATE` 和 `MERGE` 完全等价，随便写'
        ],
        answer: 1,
        explanation: '笔记专门强调：`MERGE` 负责“认身份”，只放唯一键；`SET` 负责“补描述”。这样后续补数据、更新数据、重复导入时更稳。'
      },
      {
        id: 11,
        tag: '关系导入',
        question: '在导入关系时，为什么不建议把“股权比例”这种易变属性直接写进关系 `MERGE` 的身份里？',
        options: [
          '因为关系不能有属性',
          '因为会导致关系方向自动反转',
          '因为易变属性会干扰身份匹配，后续更新和重复导入不稳定',
          '因为 `MERGE` 只能用于节点，不能用于关系'
        ],
        answer: 2,
        explanation: '笔记的意思很直接：易变属性不该参与“认身份”。如果把股权比例这类会变化的字段写进关系 `MERGE`，后续导入很容易被当成新关系，越导越乱。'
      },
      {
        id: 12,
        tag: '属性类型转换',
        question: '进行属性类型转换前，笔记建议先做什么？',
        options: [
          '直接全表覆盖转换，省时间',
          '先删掉原字段，再赌它能成功',
          '先检查脏值，必要时先写到新字段验证',
          '先导出成 Excel 再导回来'
        ],
        answer: 2,
        explanation: '笔记建议非常稳：先检查空字符串、null、非法内容等脏值；更保险的做法是先转到新字段里验证，确认没问题再覆盖原字段。别一把梭把数据整成事故现场。'
      }
    ];

    const state = {
      answered: new Map(),
      wrongs: new Map()
    };

    const quizEl = document.getElementById('quiz');
    const summaryText = document.getElementById('summaryText');
    const exportWrongBtn = document.getElementById('exportWrongBtn');
    const resetBtn = document.getElementById('resetBtn');

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function updateSummary() {
      const answeredCount = state.answered.size;
      const wrongCount = state.wrongs.size;
      if (!answeredCount) {
        summaryText.textContent = '先把题点完。页面底部这个按钮，专门负责把你这次翻车的题打包带走。';
        return;
      }
      summaryText.textContent = `当前已作答 ${answeredCount}/${questions.length} 题，错了 ${wrongCount} 题。做完后点“导出错题 Markdown”，就能把错题带走复盘。`;
    }

    function handleAnswer(card, q, selectedIndex) {
      if (state.answered.has(q.id)) return;
      state.answered.set(q.id, selectedIndex);

      const buttons = [...card.querySelectorAll('.option-btn')];
      const exp = card.querySelector('.explanation');
      const isCorrect = selectedIndex === q.answer;

      buttons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === q.answer) {
          btn.classList.add('correct');
        } else if (idx === selectedIndex) {
          btn.classList.add('wrong');
        } else {
          btn.classList.add('dimmed');
        }
      });

      if (!isCorrect) {
        state.wrongs.set(q.id, {
          id: q.id,
          tag: q.tag,
          question: q.question,
          selected: q.options[selectedIndex],
          correct: q.options[q.answer],
          explanation: q.explanation
        });
      }

      exp.classList.add('show', isCorrect ? 'correct-mode' : 'wrong-mode');
      exp.innerHTML = `
        <div class="result-line">${isCorrect ? '答对了，继续冲。' : '这题翻车了，但问题不大。'}</div>
        <div><strong>正确答案：</strong>${String.fromCharCode(65 + q.answer)}. ${escapeHtml(q.options[q.answer])}</div>
        ${!isCorrect ? `<div><strong>你选择的是：</strong>${String.fromCharCode(65 + selectedIndex)}. ${escapeHtml(q.options[selectedIndex])}</div>` : ''}
        <div style="margin-top:6px;"><strong>解析：</strong>${escapeHtml(q.explanation)}</div>
      `;

      updateSummary();
    }

    function renderQuiz() {
      quizEl.innerHTML = '';
      questions.forEach((q, index) => {
        const card = document.createElement('article');
        card.className = 'question-card';
        card.innerHTML = `
          <div class="question-top">
            <div class="q-index">${index + 1}</div>
            <div class="tag">${escapeHtml(q.tag)}</div>
          </div>
          <h2 class="question-title">${escapeHtml(q.question)}</h2>
          <div class="options"></div>
          <div class="explanation"></div>
        `;

        const optionsEl = card.querySelector('.options');
        q.options.forEach((option, idx) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.type = 'button';
          btn.innerHTML = `<strong>${String.fromCharCode(65 + idx)}.</strong> ${escapeHtml(option)}`;
          btn.addEventListener('click', () => handleAnswer(card, q, idx));
          optionsEl.appendChild(btn);
        });

        quizEl.appendChild(card);
      });
      updateSummary();
    }

    function exportWrongAnswersMarkdown() {
      const wrongItems = [...state.wrongs.values()];
      if (!wrongItems.length) {
        alert('当前还没有错题可导出。要么你太强了，要么还没开始做。');
        return;
      }

      const now = new Date();
      const ts = now.toLocaleString('zh-CN', { hour12: false });
      const lines = [
        '# 图数据库错题本',
        '',
        `- 来源：图数据库学习笔记-2026-03-26`,
        `- 导出时间：${ts}`,
        `- 错题数量：${wrongItems.length}`,
        '',
        '---',
        ''
      ];

      wrongItems.forEach((item, idx) => {
        lines.push(`## ${idx + 1}. ${item.question}`);
        lines.push('');
        lines.push(`- 知识点：${item.tag}`);
        lines.push(`- 你选错的答案：${item.selected}`);
        lines.push(`- 正确答案：${item.correct}`);
        lines.push(`- 解析：${item.explanation}`);
        lines.push('');
      });

      const blob = new Blob([lines.join('\n')], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `图数据库错题本-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.md`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function resetQuiz() {
      state.answered.clear();
      state.wrongs.clear();
      renderQuiz();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    exportWrongBtn.addEventListener('click', exportWrongAnswersMarkdown);
    resetBtn.addEventListener('click', resetQuiz);

    renderQuiz();
  </script>
</body>
</html>
