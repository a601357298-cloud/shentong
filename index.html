<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>国产数据库刷题页</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --ok: #15803d;
      --ok-soft: #dcfce7;
      --bad: #b91c1c;
      --bad-soft: #fee2e2;
      --border: #e5e7eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 240px);
      color: var(--text);
      line-height: 1.65;
    }

    .container {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero {
      background: rgba(255,255,255,0.84);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 18px 0 8px;
    }

    .meta-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .meta-card strong {
      display: block;
      font-size: 22px;
      margin-bottom: 2px;
    }

    .quiz-list {
      display: grid;
      gap: 18px;
      margin-top: 20px;
    }

    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .question-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .q-index {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #111827;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    .tag {
      padding: 4px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
    }

    .question-title {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      transition: .18s ease;
      font-size: 15px;
      color: var(--text);
    }

    .option-btn:hover {
      transform: translateY(-1px);
      border-color: #bfdbfe;
      background: #f8fbff;
    }

    .option-btn.correct {
      border-color: #86efac;
      background: var(--ok-soft);
      color: #14532d;
      font-weight: 700;
    }

    .option-btn.wrong {
      border-color: #fca5a5;
      background: var(--bad-soft);
      color: #7f1d1d;
      font-weight: 700;
    }

    .option-btn.dimmed { opacity: .72; }

    .explanation {
      display: none;
      margin-top: 14px;
      border-radius: 16px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      background: #f9fafb;
    }

    .explanation.show { display: block; }
    .explanation.correct-mode {
      border-color: #86efac;
      background: #f0fdf4;
    }
    .explanation.wrong-mode {
      border-color: #fecaca;
      background: #fef2f2;
    }

    .result-line {
      font-weight: 800;
      margin-bottom: 6px;
    }

    .summary-panel {
      margin-top: 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .summary-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
    }

    .action-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: .18s ease;
    }

    .action-btn.primary {
      background: var(--primary);
      color: #fff;
    }

    .action-btn.primary:hover {
      opacity: .92;
      transform: translateY(-1px);
    }

    .action-btn.secondary {
      background: #eef2ff;
      color: #1e3a8a;
      border: 1px solid #c7d2fe;
    }

    .action-btn.secondary:hover { background: #e0e7ff; }

    .footer {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .container { width: min(100% - 20px, 980px); padding-top: 18px; }
      .hero, .question-card, .summary-panel { padding: 18px; border-radius: 18px; }
      .question-title { font-size: 18px; }
      .summary-actions { flex-direction: column; }
      .action-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="badge">静态网站 · index.html</div>
      <h1>国产数据库刷题页</h1>
      <p class="lead">这版先按你要的 20 题标准版来，覆盖国产数据库通识、关系模型、SQL 基础、主键外键、事务、索引、备份、安全控制这些高频考点。点任意选项后，会直接显示对错和解析；底部支持导出错题 Markdown。</p>
      <div class="meta">
        <div class="meta-card">
          <strong>20</strong>
          <span>道单选题</span>
        </div>
        <div class="meta-card">
          <strong>国产数据库</strong>
          <span>通识 + 基础 SQL + 数据库核心概念</span>
        </div>
        <div class="meta-card">
          <strong>错题导出</strong>
          <span>支持导出 Markdown，方便继续复盘</span>
        </div>
      </div>
    </section>

    <main id="quiz" class="quiz-list"></main>

    <section class="summary-panel">
      <h2 style="margin:0 0 8px;">先刷，再复盘</h2>
      <p id="summaryText" style="margin:0;color:var(--muted);">先把题点完。底部按钮会把你这次做错的题导出成 Markdown，方便继续回炉重造。</p>
      <div class="summary-actions">
        <button id="exportWrongBtn" class="action-btn primary">导出错题 Markdown</button>
        <button id="resetBtn" class="action-btn secondary">重做一遍</button>
      </div>
    </section>

    <p class="footer">复习建议：别只背 A/B/C/D，重点搞懂主键、外键、事务、索引、备份这些概念，不然选择题做得像开盲盒。</p>
  </div>

  <script>
    const questions = [
      {
        id: 1,
        tag: '国产数据库通识',
        question: '下列哪一项不属于常见的国产数据库产品？',
        options: ['神通数据库', '达梦数据库', 'OceanBase', 'MongoDB'],
        answer: 3,
        explanation: '神通、达梦、OceanBase 都是常见国产数据库产品；MongoDB 是国外的文档型数据库。'
      },
      {
        id: 2,
        tag: '数据库基础',
        question: '数据库管理系统中，负责对数据进行统一管理和控制的软件称为：',
        options: ['操作系统', '数据库管理系统', '编译程序', 'Office 软件'],
        answer: 1,
        explanation: '题干其实已经把答案递到你手边了，负责数据统一管理和控制的就是 DBMS。'
      },
      {
        id: 3,
        tag: '数据库目标',
        question: '数据库系统的核心目标之一是：',
        options: ['只用于存图片', '实现数据的共享、管理与控制', '替代所有应用软件', '只支持单用户访问'],
        answer: 1,
        explanation: '数据库不是仓库摆件，它的核心价值在于高效存储、共享、管理和控制数据。'
      },
      {
        id: 4,
        tag: '关系模型',
        question: '在关系数据库中，表中的一行通常称为：',
        options: ['字段', '记录', '模式', '视图'],
        answer: 1,
        explanation: '一行是一条记录，一列是一个字段。这个属于数据库入门必考送分题。'
      },
      {
        id: 5,
        tag: '关系模型',
        question: '在关系数据库中，表中的一列通常称为：',
        options: ['元组', '记录', '字段', '索引'],
        answer: 2,
        explanation: '列对应字段，行对应记录。别把“元组”这类术语和日常表述搞串了。'
      },
      {
        id: 6,
        tag: '键约束',
        question: '用来唯一标识表中一条记录的键称为：',
        options: ['外键', '主键', '候选键', '联合键'],
        answer: 1,
        explanation: '主键的核心作用就是唯一标识记录，而且通常不允许重复、不能为空。'
      },
      {
        id: 7,
        tag: 'SQL 基础',
        question: 'SQL 语言中，用于查询数据的语句是：',
        options: ['INSERT', 'UPDATE', 'DELETE', 'SELECT'],
        answer: 3,
        explanation: 'SELECT 负责查，INSERT 负责加，UPDATE 负责改，DELETE 负责删。四大金刚别认错。'
      },
      {
        id: 8,
        tag: 'SQL 基础',
        question: 'SQL 语言中，用于向表中新增数据的语句是：',
        options: ['INSERT', 'CREATE', 'ALTER', 'DROP'],
        answer: 0,
        explanation: 'INSERT 是插入数据，CREATE 是创建对象，ALTER 是修改结构，DROP 是删除对象。'
      },
      {
        id: 9,
        tag: 'SQL 基础',
        question: 'SQL 语言中，用于修改表中已有数据的语句是：',
        options: ['CHANGE', 'MODIFY', 'UPDATE', 'EDIT'],
        answer: 2,
        explanation: '标准 SQL 里改数据用 UPDATE。别让英语直觉把你带去不存在的关键字。'
      },
      {
        id: 10,
        tag: 'SQL 基础',
        question: 'SQL 语言中，用于删除表结构的语句是：',
        options: ['REMOVE TABLE', 'DELETE TABLE', 'DROP TABLE', 'CLEAR TABLE'],
        answer: 2,
        explanation: 'DROP TABLE 是删除表结构；DELETE 是删表里的数据，不删表本身。'
      },
      {
        id: 11,
        tag: '主键',
        question: '下列关于主键的说法，正确的是：',
        options: ['主键允许重复', '主键可以为空', '主键用于唯一标识记录', '一张表必须有多个主键'],
        answer: 2,
        explanation: '主键的灵魂就是“唯一标识”。一般不允许重复，也不应为空。'
      },
      {
        id: 12,
        tag: '外键',
        question: '外键的主要作用是：',
        options: ['提高输入速度', '保证参照完整性', '自动生成报表', '备份数据库'],
        answer: 1,
        explanation: '外键主要用于维护表与表之间的引用关系，防止出现“父表没这条、子表硬说有”的离谱情况。'
      },
      {
        id: 13,
        tag: '索引',
        question: '为了提高查询效率，数据库中常使用：',
        options: ['约束', '索引', '触发器', '视图'],
        answer: 1,
        explanation: '索引的核心作用就是提高查询速度，但也会带来额外存储和写入维护成本。'
      },
      {
        id: 14,
        tag: '事务',
        question: '关于事务的说法，正确的是：',
        options: ['事务中的操作必须全部成功或全部失败', '事务只适用于查询语句', '事务执行后不能回滚', '一个数据库不能有事务'],
        answer: 0,
        explanation: '这说的是事务的原子性：要么全成，要么全撤，不搞半死不活。'
      },
      {
        id: 15,
        tag: 'ACID',
        question: '事务的 ACID 特性中，A 指的是：',
        options: ['Accuracy', 'Atomicity', 'Activity', 'Access'],
        answer: 1,
        explanation: 'A 是 Atomicity，原子性。ACID 里最容易靠英语瞎蒙，但别蒙偏了。'
      },
      {
        id: 16,
        tag: '备份恢复',
        question: '数据库备份的主要目的是：',
        options: ['提高输入速度', '增加表数量', '防止数据丢失、便于恢复', '自动编写程序'],
        answer: 2,
        explanation: '备份不是仪式感，是兜底手段。真出事时，恢复能力比嘴硬重要。'
      },
      {
        id: 17,
        tag: '安全管理',
        question: '在数据库安全管理中，用来限制不同用户操作权限的是：',
        options: ['排序', '授权', '压缩', '联接'],
        answer: 1,
        explanation: '权限控制靠授权实现。谁能查、谁能改、谁能删，都得靠权限体系管起来。'
      },
      {
        id: 18,
        tag: '视图',
        question: '视图（View）的主要作用之一是：',
        options: ['永久存储所有原始数据', '提供数据的逻辑展示与安全控制', '替代所有数据表', '自动删除重复数据'],
        answer: 1,
        explanation: '视图更像一个逻辑窗口，方便展示特定数据，也常用于控制用户可见范围。'
      },
      {
        id: 19,
        tag: '表关系',
        question: '关系数据库中，两个表之间建立联系通常依靠：',
        options: ['主键和外键', '字段长度', '表名相同', '创建时间一致'],
        answer: 0,
        explanation: '表关系通常通过主键和外键建立，不靠缘分，也不靠同名碰瓷。'
      },
      {
        id: 20,
        tag: '国产数据库意义',
        question: '下列说法中，最符合国产数据库发展意义的是：',
        options: ['仅仅是更换英文界面', '有助于信息技术应用创新与自主可控', '只能用于学校机房', '不能支持企业级应用'],
        answer: 1,
        explanation: '国产数据库的意义不只是“换个牌子”，更关键在于自主可控、产业生态和关键场景落地。'
      }
    ];

    const state = {
      answered: new Map(),
      wrongs: new Map()
    };

    const quizEl = document.getElementById('quiz');
    const summaryText = document.getElementById('summaryText');
    const exportWrongBtn = document.getElementById('exportWrongBtn');
    const resetBtn = document.getElementById('resetBtn');

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function updateSummary() {
      const answeredCount = state.answered.size;
      const wrongCount = state.wrongs.size;
      if (!answeredCount) {
        summaryText.textContent = '先把题点完。底部按钮会把你这次做错的题导出成 Markdown，方便继续回炉重造。';
        return;
      }
      summaryText.textContent = `当前已作答 ${answeredCount}/${questions.length} 题，错了 ${wrongCount} 题。做完后点“导出错题 Markdown”，就能把错题带走复盘。`;
    }

    function handleAnswer(card, q, selectedIndex) {
      if (state.answered.has(q.id)) return;
      state.answered.set(q.id, selectedIndex);

      const buttons = [...card.querySelectorAll('.option-btn')];
      const exp = card.querySelector('.explanation');
      const isCorrect = selectedIndex === q.answer;

      buttons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === q.answer) btn.classList.add('correct');
        else if (idx === selectedIndex) btn.classList.add('wrong');
        else btn.classList.add('dimmed');
      });

      if (!isCorrect) {
        state.wrongs.set(q.id, {
          id: q.id,
          tag: q.tag,
          question: q.question,
          selected: q.options[selectedIndex],
          correct: q.options[q.answer],
          explanation: q.explanation
        });
      }

      exp.classList.add('show', isCorrect ? 'correct-mode' : 'wrong-mode');
      exp.innerHTML = `
        <div class="result-line">${isCorrect ? '答对了，继续冲。' : '这题翻车了，但问题不大。'}</div>
        <div><strong>正确答案：</strong>${String.fromCharCode(65 + q.answer)}. ${escapeHtml(q.options[q.answer])}</div>
        ${!isCorrect ? `<div><strong>你选择的是：</strong>${String.fromCharCode(65 + selectedIndex)}. ${escapeHtml(q.options[selectedIndex])}</div>` : ''}
        <div style="margin-top:6px;"><strong>解析：</strong>${escapeHtml(q.explanation)}</div>
      `;

      updateSummary();
    }

    function renderQuiz() {
      quizEl.innerHTML = '';
      questions.forEach((q, index) => {
        const card = document.createElement('article');
        card.className = 'question-card';
        card.innerHTML = `
          <div class="question-top">
            <div class="q-index">${index + 1}</div>
            <div class="tag">${escapeHtml(q.tag)}</div>
          </div>
          <h2 class="question-title">${escapeHtml(q.question)}</h2>
          <div class="options"></div>
          <div class="explanation"></div>
        `;

        const optionsEl = card.querySelector('.options');
        q.options.forEach((option, idx) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.type = 'button';
          btn.innerHTML = `<strong>${String.fromCharCode(65 + idx)}.</strong> ${escapeHtml(option)}`;
          btn.addEventListener('click', () => handleAnswer(card, q, idx));
          optionsEl.appendChild(btn);
        });

        quizEl.appendChild(card);
      });
      updateSummary();
    }

    function downloadBlob(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportWrongAnswersMarkdown() {
      const wrongItems = [...state.wrongs.values()];
      if (!wrongItems.length) {
        alert('当前还没有错题可导出。要么你太强了，要么还没开始做。');
        return;
      }

      const now = new Date();
      const ts = now.toLocaleString('zh-CN', { hour12: false });
      const stamp = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}-${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}${String(now.getSeconds()).padStart(2, '0')}`;

      const lines = [
        '# 国产数据库错题本',
        '',
        '- 来源：sk 生成的国产数据库 20 题标准版',
        `- 导出时间：${ts}`,
        `- 错题数量：${wrongItems.length}`,
        '',
        '---',
        ''
      ];

      wrongItems.forEach((item, idx) => {
        lines.push(`## ${idx + 1}. ${item.question}`);
        lines.push('');
        lines.push(`- 知识点：${item.tag}`);
        lines.push(`- 你选错的答案：${item.selected}`);
        lines.push(`- 正确答案：${item.correct}`);
        lines.push(`- 解析：${item.explanation}`);
        lines.push('');
      });

      downloadBlob(`domestic-db-wrong-answers-${stamp}.md`, lines.join('\n'), 'text/markdown;charset=utf-8');
    }

    function resetQuiz() {
      state.answered.clear();
      state.wrongs.clear();
      renderQuiz();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    exportWrongBtn.addEventListener('click', exportWrongAnswersMarkdown);
    resetBtn.addEventListener('click', resetQuiz);

    renderQuiz();
  </script>
</body>
</html>
