<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数据库与 Python 数字化审计练习</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --ok: #15803d;
      --ok-soft: #dcfce7;
      --bad: #b91c1c;
      --bad-soft: #fee2e2;
      --border: #e5e7eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 240px);
      color: var(--text);
      line-height: 1.65;
    }

    .container {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin: 18px 0 8px;
    }

    .meta-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
    }

    .meta-card strong {
      display: block;
      font-size: 22px;
      margin-bottom: 2px;
    }

    .quiz-list {
      display: grid;
      gap: 18px;
      margin-top: 20px;
    }

    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .question-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .q-index {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: #111827;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    .tag {
      padding: 4px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
    }

    .question-title {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      cursor: pointer;
      transition: .18s ease;
      font-size: 15px;
      color: var(--text);
    }

    .option-btn:hover {
      transform: translateY(-1px);
      border-color: #bfdbfe;
      background: #f8fbff;
    }

    .option-btn.correct {
      border-color: #86efac;
      background: var(--ok-soft);
      color: #14532d;
      font-weight: 700;
    }

    .option-btn.wrong {
      border-color: #fca5a5;
      background: var(--bad-soft);
      color: #7f1d1d;
      font-weight: 700;
    }

    .option-btn.dimmed {
      opacity: .72;
    }

    .explanation {
      display: none;
      margin-top: 14px;
      border-radius: 16px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      background: #f9fafb;
    }

    .explanation.show { display: block; }
    .explanation.correct-mode {
      border-color: #86efac;
      background: #f0fdf4;
    }
    .explanation.wrong-mode {
      border-color: #fecaca;
      background: #fef2f2;
    }

    .result-line {
      font-weight: 800;
      margin-bottom: 6px;
    }

    .summary-panel {
      margin-top: 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .summary-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
    }

    .action-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: .18s ease;
    }

    .action-btn.primary {
      background: var(--primary);
      color: #fff;
    }

    .action-btn.primary:hover {
      opacity: .92;
      transform: translateY(-1px);
    }

    .action-btn.secondary {
      background: #eef2ff;
      color: #1e3a8a;
      border: 1px solid #c7d2fe;
    }

    .action-btn.secondary:hover {
      background: #e0e7ff;
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .container { width: min(100% - 20px, 960px); padding-top: 18px; }
      .hero, .question-card, .summary-panel { padding: 18px; border-radius: 18px; }
      .question-title { font-size: 18px; }
      .summary-actions { flex-direction: column; }
      .action-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="badge">静态网站 · index.html</div>
      <h1>数据库与 Python 数字化审计练习站</h1>
      <p class="lead">题目整理自《第4周培训学习心得》。点击任意选项后，会直接在题目下方显示对错和解析，顺手还能把错题一键导出成 Markdown。</p>
      <div class="meta">
        <div class="meta-card">
          <strong>15</strong>
          <span>道单选题</span>
        </div>
        <div class="meta-card">
          <strong>7</strong>
          <span>核心主题：数据库备份/权限 / 正则/文件操作 / openpyxl/NumPy/Pandas / 自动化处理链</span>
        </div>
        <div class="meta-card">
          <strong>一键导出</strong>
          <span>做完题可导出错题 Markdown</span>
        </div>
      </div>
    </section>

    <main id="quiz" class="quiz-list"></main>

    <section class="summary-panel">
      <h2 style="margin:0 0 8px;">做完别急着跑</h2>
      <p id="summaryText" style="margin:0;color:var(--muted);">先把题点完。页面底部这个按钮，专门负责把你这次翻车的题打包带走。</p>
      <div class="summary-actions">
        <button id="exportWrongBtn" class="action-btn primary">导出错题 Markdown</button>
        <button id="resetBtn" class="action-btn secondary">重做一遍</button>
      </div>
    </section>

    <p class="footer">复习建议：优先理解每个知识点背后的"审计应用场景"，而不仅仅是记语法。</p>
  </div>

  <script>
    const questions = [
      {
        id: 1,
        tag: '最小权限原则',
        question: '下列哪一项最能体现"最小权限原则"在审计中的应用？',
        options: [
          '给所有用户授予 PUBLIC 权限，方便统一访问',
          '只授予完成当前工作必需的权限',
          '给普通用户加上 WITH ADMIN OPTION，便于临时授权',
          '让业务人员共享管理员账号，提高效率'
        ],
        answer: 1,
        explanation: '最小权限原则要求只授予完成任务所需的最小权限集。 PUBLIC 全开、共享管理员、WITH ADMIN OPTION 都会增加越权风险，不符合审计内控要求。'
      },
      {
        id: 2,
        tag: '备份恢复',
        question: '在审计视角下，下列关于数据库备份恢复的说法，最合适的是？',
        options: [
          '只要做过一次备份，就不需要考虑归档',
          '恢复机制是否健全，与审计无关，属于运维问题',
          '备份策略、归档机制和恢复能力是信息系统审计的重要关注点',
          '数据库只要能查询，就说明控制有效'
        ],
        answer: 2,
        explanation: '审计会重点检查：是否定期备份、归档是否开启、能否按时间点恢复、恢复演练是否到位。这些直接影响业务连续性和数据安全性。'
      },
      {
        id: 3,
        tag: 'WITH 选项差异',
        question: '关于 WITH GRANT OPTION 和 WITH ADMIN OPTION 的风险，下列哪项正确？',
        options: [
          '两者完全相同，不存在差异',
          '只有 WITH GRANT OPTION 会带来权限扩散风险',
          '两者都可能导致权限扩散，需要审计关注',
          'WITH ADMIN OPTION 只能由系统管理员使用，不会扩散'
        ],
        answer: 2,
        explanation: 'WITH GRANT OPTION 允许被授权者继续授权他人，WITH ADMIN OPTION 允许继续授予管理权限。两者都可能导致权限层层扩散，审计上要重点检查。'
      },
      {
        id: 4,
        tag: '正则应用',
        question: '下列哪个场景最适合使用正则表达式？',
        options: [
          '处理批量命名的合同文件、从杂乱文本中提取关键字段',
          '编写数据库存储过程',
          '设计数据库表结构',
          '直接做数学矩阵运算'
        ],
        answer: 0,
        explanation: '正则表达式在审计中的典型用法：从制度文本、日志、合同目录、批量命名文件等半结构化资料中，快速提取关键字段、识别模式化异常。'
      },
      {
        id: 5,
        tag: 'with open',
        question: '关于 Python 文件操作的 with open(...) 写法，下列哪项更规范？',
        options: [
          'f = open("file.txt"); content = f.read(); f.close()',
          'with open("file.txt") as f: content = f.read()',
          'content = open("file.txt").read()',
          'f = open("file.txt", encoding="utf-8");'
        ],
        answer: 1,
        explanation: 'with open(...) 会在退出时自动关闭文件，避免忘记 close() 导致的资源泄漏，比手动 open/close 更安全、更推荐。'
      },
      {
        id: 6,
        tag: '工具定位',
        question: '下列工具中，最贴近日常二维表格清洗、合并、去重场景的是？',
        options: [
          'NumPy',
          'Pandas',
          'openpyxl',
          '正则表达式'
        ],
        answer: 1,
        explanation: 'Pandas 专门用于二维表数据处理，去重、缺失值识别、多表合并、筛选分析等操作都比 openpyxl 和 NumPy 更贴近审计日常场景。'
      },
      {
        id: 7,
        tag: 'openpyxl vs NumPy vs Pandas',
        question: '关于 openpyxl、NumPy、Pandas 的理解，哪项更准确？',
        options: [
          'openpyxl 主要用于高性能矩阵计算',
          'NumPy 更适合处理 Excel 格式样式与单元格结构',
          'openpyxl 偏向 Excel 载体结构控制，NumPy 是数值计算引擎，Pandas 是二维表数据分析工具',
          '三者用途完全相同，只是写法不同'
        ],
        answer: 2,
        explanation: 'openpyxl 主要处理 Excel 载体（工作簿、工作表、单元格）；NumPy 是数值计算底层引擎；Pandas 是表格数据分析工具，更适合审计中的清洗、合并、筛选等。'
      },
      {
        id: 8,
        tag: 'Pandas 操作',
        question: '在 Pandas 中，下列哪项操作最适合处理"重复付款记录"和"缺失供应商信息"？',
        options: [
          '直接用 openpyxl 逐个单元格判断',
          '用 NumPy 数组做矩阵运算',
          '用 Pandas 的 drop_duplicates() 和 isnull() 等方法做去重和空值识别',
          '用正则表达式逐行匹配'
        ],
        answer: 2,
        explanation: 'Pandas 的 drop_duplicates() 可以快速去重，isnull()/fillna() 等方法可以识别和处理缺失值，非常适合批量清洗审计台账和底稿。'
      },
      {
        id: 9,
        tag: '表合并',
        question: '在 Pandas 中，合并两张 Excel 表（如付款台账 + 供应商主数据），最常用的是？',
        options: [
          'merge()',
          'concat()',
          'join()',
          'append()'
        ],
        answer: 0,
        explanation: 'Pandas 的 merge() 支持按指定字段（如供应商编号）做类似 SQL JOIN 的合并，适合把台账和主数据关联起来做交叉验证。concat() 更多用于上下拼接。'
      },
      {
        id: 10,
        tag: '文件模式',
        question: '在 Python 中，处理文本日志文件和二进制日志文件，主要区别在于？',
        options: [
          '两者完全一样，不需要区分',
          '文本文件需要指定 encoding，二进制文件用 "b" 模式',
          '文本文件用 open()，二进制文件用 with open()',
          '二进制文件不能读取，只能写入'
        ],
        answer: 1,
        explanation: '文本文件打开时通常需要指定编码（如 utf-8）；二进制文件需要加 "b" 模式（如 rb/wb）。审计日志可能有两种格式，需要区分处理。'
      },
      {
        id: 11,
        tag: '正则方法',
        question: '下列哪个正则方法最适合从大段文本中找出"所有符合条件的子串"？',
        options: [
          'search()',
          'match()',
          'findall()',
          'compile()'
        ],
        answer: 2,
        explanation: 'findall() 会返回所有匹配的子串列表，适合从大段文本批量提取关键字段或异常模式。search() 只返回第一个，match() 只从开头匹配。'
      },
      {
        id: 12,
        tag: '视图索引审计',
        question: '视图、索引、存储过程等数据库对象，对审计的主要意义在于？',
        options: [
          '只和开发有关，与审计完全没关系',
          '这些对象可以优化查询，但审计无需关注',
          '理解这些对象有助于看清系统设计、性能瓶颈和潜在控制点',
          '审计只要会查数据就行，不需要理解结构'
        ],
        answer: 2,
        explanation: '视图更新限制、索引作用边界、存储过程权限分配等，都会影响数据可访问性、性能和安全控制。审计需要从这些对象层面理解系统控制是否健全。'
      },
      {
        id: 13,
        tag: 'PUBLIC 权限风险',
        question: '如果某系统中大量对象权限通过 PUBLIC 开放，审计上你会优先联想到什么？',
        options: [
          '系统设计非常规范',
          '所有用户都经过严格身份认证',
          '越权访问、数据泄露、权限治理失控',
          'PUBLIC 权限不会带来任何风险'
        ],
        answer: 2,
        explanation: 'PUBLIC 全开意味着任何用户（包括匿名）都能访问这些对象，这通常违反最小权限原则，可能导致越权访问和数据泄露。审计上需要重点关注。'
      },
      {
        id: 14,
        tag: '字段类型选择',
        question: '身份证号、公司编号、项目编号这类字段，更建议存成什么类型？',
        options: [
          '整数',
          '浮点数',
          '字符串',
          '布尔值'
        ],
        answer: 2,
        explanation: '这类编号可能很长、有前导零，用数字类型容易精度失真或把前导零吃掉，优先存成字符串更能保证数据完整性。'
      },
      {
        id: 15,
        tag: '自动化处理链',
        question: '为什么说 Python 的文件操作、openpyxl 和 Pandas 不是孤立知识，而是一条可串起来的"自动化处理链"？',
        options: [
          '因为它们都是第三方库，需要同时安装',
          '因为文件读取可以批量拿到资料，openpyxl/Pandas 可以处理成清洗结果，三者串起来能替代大量重复手工',
          '因为它们都需要写 import 语句',
          '因为它们都支持 with 写法'
        ],
        answer: 1,
        explanation: '文件操作负责批量读取资料（合同、日志、台账），openpyxl 可以控制 Excel 结构，Pandas 可以做清洗、去重、合并。三者串起来，就能把大量重复性工作交给程序完成，审计人员专注分析。'
      }
    ];

    const state = {
      answered: new Map(),
      wrongs: new Map()
    };

    const quizEl = document.getElementById('quiz');
    const summaryText = document.getElementById('summaryText');
    const exportWrongBtn = document.getElementById('exportWrongBtn');
    const resetBtn = document.getElementById('resetBtn');

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function updateSummary() {
      const answeredCount = state.answered.size;
      const wrongCount = state.wrongs.size;
      if (!answeredCount) {
        summaryText.textContent = '先把题点完。页面底部这个按钮，专门负责把你这次翻车的题打包带走。';
        return;
      }
      summaryText.textContent = `当前已作答 ${answeredCount}/${questions.length} 题，错了 ${wrongCount} 题。做完后点"导出错题 Markdown"，就能把错题带走复盘。`;
    }

    function handleAnswer(card, q, selectedIndex) {
      if (state.answered.has(q.id)) return;
      state.answered.set(q.id, selectedIndex);

      const buttons = [...card.querySelectorAll('.option-btn')];
      const exp = card.querySelector('.explanation');
      const isCorrect = selectedIndex === q.answer;

      buttons.forEach((btn, idx) => {
        btn.disabled = true;
        if (idx === q.answer) {
          btn.classList.add('correct');
        } else if (idx === selectedIndex) {
          btn.classList.add('wrong');
        } else {
          btn.classList.add('dimmed');
        }
      });

      if (!isCorrect) {
        state.wrongs.set(q.id, {
          id: q.id,
          tag: q.tag,
          question: q.question,
          selected: q.options[selectedIndex],
          correct: q.options[q.answer],
          explanation: q.explanation
        });
      }

      exp.classList.add('show', isCorrect ? 'correct-mode' : 'wrong-mode');
      exp.innerHTML = `
        <div class="result-line">${isCorrect ? '答对了，继续冲。' : '这题翻车了，但问题不大。'}</div>
        <div><strong>正确答案：</strong>${String.fromCharCode(65 + q.answer)}. ${escapeHtml(q.options[q.answer])}</div>
        ${!isCorrect ? `<div><strong>你选择的是：</strong>${String.fromCharCode(65 + selectedIndex)}. ${escapeHtml(q.options[selectedIndex])}</div>` : ''}
        <div style="margin-top:6px;"><strong>解析：</strong>${escapeHtml(q.explanation)}</div>
      `;

      updateSummary();
    }

    function renderQuiz() {
      quizEl.innerHTML = '';
      questions.forEach((q, index) => {
        const card = document.createElement('article');
        card.className = 'question-card';
        card.innerHTML = `
          <div class="question-top">
            <div class="q-index">${index + 1}</div>
            <div class="tag">${escapeHtml(q.tag)}</div>
          </div>
          <h2 class="question-title">${escapeHtml(q.question)}</h2>
          <div class="options"></div>
          <div class="explanation"></div>
        `;

        const optionsEl = card.querySelector('.options');
        q.options.forEach((option, idx) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.type = 'button';
          btn.innerHTML = `<strong>${String.fromCharCode(65 + idx)}.</strong> ${escapeHtml(option)}`;
          btn.addEventListener('click', () => handleAnswer(card, q, idx));
          optionsEl.appendChild(btn);
        });

        quizEl.appendChild(card);
      });
      updateSummary();
    }

    function exportWrongAnswersMarkdown() {
      const wrongItems = [...state.wrongs.values()];
      if (!wrongItems.length) {
        alert('当前还没有错题可导出。要么你太强了，要么还没开始做。');
        return;
      }

      const now = new Date();
      const ts = now.toLocaleString('zh-CN', { hour12: false });
      const lines = [
        '# 数据库与 Python 数字化审计错题本',
        '',
        `- 来源：第4周培训学习心得`,
        `- 导出时间：${ts}`,
        `- 错题数量：${wrongItems.length}`,
        '',
        '---',
        ''
      ];

      wrongItems.forEach((item, idx) => {
        lines.push(`## ${idx + 1}. ${item.question}`);
        lines.push('');
        lines.push(`- 知识点：${item.tag}`);
        lines.push(`- 你选错的答案：${item.selected}`);
        lines.push(`- 正确答案：${item.correct}`);
        lines.push(`- 解析：${item.explanation}`);
        lines.push('');
      });

      const blob = new Blob([lines.join('\n')], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `数字化审计错题本-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.md`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function resetQuiz() {
      state.answered.clear();
      state.wrongs.clear();
      renderQuiz();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    exportWrongBtn.addEventListener('click', exportWrongAnswersMarkdown);
    resetBtn.addEventListener('click', resetQuiz);

    renderQuiz();
  </script>
</body>
</html>
